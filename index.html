<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BondCheck // Onyx</title>
    
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Via CDN for immediate use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Grid.js (For High Performance Tables) -->
    <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

    <!-- Tailwind Config for "Onyx" Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        onyx: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            800: '#1f2937',
                            900: '#0f172a', /* The "Onyx" Black */
                            950: '#020617',
                        },
                        accent: '#2563EB', // Electric Blue
                    }
                }
            }
        }
    </script>

    <style>
        /* --- Override Grid.js Standard Styles for Onyx Look --- */
        .gridjs-container { font-family: 'Inter', sans-serif; color: #0f172a; box-shadow: none !important; }
        .gridjs-wrapper { border-radius: 4px; border: 1px solid #e2e8f0; box-shadow: none; }
        .gridjs-table { width: 100%; }
        
        /* Headers */
        .gridjs-th {
            background-color: #f8fafc;
            border-bottom: 2px solid #0f172a; /* Sharp contrast line */
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px 16px;
        }

        /* Cells */
        .gridjs-td {
            border-bottom: 1px solid #f1f5f9;
            padding: 14px 16px;
            font-size: 0.9rem;
        }
        
        /* Pagination Bar */
        .gridjs-footer { background: #fff; border-top: 1px solid #e2e8f0; }
        
        /* Buttons inside Grid */
        .gridjs-pagination .gridjs-pages button {
            border-radius: 4px !important;
            border: 1px solid #e2e8f0;
            background: white;
            font-family: 'Inter';
            font-weight: 500;
        }
        .gridjs-pagination .gridjs-pages button:hover { background: #0f172a; color: white; border-color: #0f172a; }
        .gridjs-pagination .gridjs-pages button.gridjs-currentPage {
            background-color: #0f172a;
            color: white;
            border-color: #0f172a;
        }

        /* Loading Skeleton Animation */
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .loading-skeleton { animation: pulse-fast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; background: #f1f5f9; color: transparent; border-radius: 2px;}

        /* Form Controls */
        select, input {
            transition: all 0.15s ease-in-out;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 1px #0f172a;
        }
    </style>
</head>
<body class="bg-white min-h-screen text-onyx-900 selection:bg-onyx-900 selection:text-white">

    <!-- Top Border -->
    <div class="h-1 w-full bg-onyx-900"></div>

    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 border-b border-gray-100 pb-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-onyx-900 flex items-center justify-center text-white font-bold rounded-sm">
                    B
                </div>
                <h1 class="text-xl font-bold tracking-tight">BondCheck <span class="text-gray-400 font-normal">PRO</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-medium uppercase tracking-wide text-gray-500">System Online</span>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 border border-gray-200 divide-y md:divide-y-0 md:divide-x divide-gray-200 rounded-sm mb-10">
            <div class="p-6">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Database Size</p>
                <h3 class="text-3xl font-mono font-semibold" id="total-draws">...</h3>
                <span class="text-xs text-gray-400 mt-2 block">Total draw records processed</span>
            </div>
            <div class="p-6">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Winners Found</p>
                <h3 class="text-3xl font-mono font-semibold text-emerald-600" id="total-winners">...</h3>
                <span class="text-xs text-gray-400 mt-2 block">Matched numbers in history</span>
            </div>
            <div class="p-6">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Total Payout</p>
                <h3 class="text-3xl font-mono font-semibold tracking-tight" id="total-amount">...</h3>
                <span class="text-xs text-gray-400 mt-2 block">Accumulated prize value (PKR)</span>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="space-y-4 mb-6">
            <div class="flex flex-col md:flex-row justify-between gap-4 items-end">
                
                <!-- Main Search -->
                <div class="w-full md:w-1/3 relative group">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1.5">Quick Search</label>
                    <div class="relative">
                        <input type="text" id="bond-number" 
                               class="w-full h-11 pl-4 pr-12 bg-gray-50 border border-gray-200 text-sm font-medium focus:bg-white placeholder-gray-400 rounded-sm"
                               placeholder="e.g. 247226">
                        <button onclick="triggerSearch()" 
                                class="absolute right-0 top-0 h-11 w-11 flex items-center justify-center bg-onyx-900 text-white hover:bg-black transition-colors rounded-r-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap gap-3 w-full md:w-auto">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1.5">Denomination</label>
                        <select id="denom-filter" class="h-11 pl-3 pr-8 bg-white border border-gray-200 text-sm font-medium rounded-sm min-w-[140px]">
                            <option value="">All Denominations</option>
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="750">750</option>
                            <option value="1500">1500</option>
                            <option value="7500">7500</option>
                            <option value="15000">15000</option>
                            <option value="25000">25000</option>
                            <option value="40000">40000</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1.5">Prize Rank</label>
                        <select id="rank-filter" class="h-11 pl-3 pr-8 bg-white border border-gray-200 text-sm font-medium rounded-sm min-w-[140px]">
                            <option value="">All Ranks</option>
                            <option value="1st">1st Prize</option>
                            <option value="2nd">2nd Prize</option>
                            <option value="3rd">3rd Prize</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1.5">Export</label>
                        <button class="h-11 px-4 border border-gray-200 bg-white hover:bg-gray-50 text-sm font-medium text-gray-600 rounded-sm flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            CSV
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- The Advanced Grid -->
        <div id="grid-wrapper"></div>

    </div>

    <script>
        const API_BASE = ''; // Keep empty if hosted on same origin
        let bondGrid;

        document.addEventListener('DOMContentLoaded', () => {
            initGrid();
            fetchStats();
            setupFilterListeners();
        });

        // 1. GRID INITIALIZATION (Using Grid.js)
        function initGrid() {
            bondGrid = new gridjs.Grid({
                columns: [
                    { id: 'bond_number', name: 'Bond #', 
                      formatter: (cell) => gridjs.html(`<span class="font-mono font-bold text-onyx-900 text-base">${cell}</span>`) 
                    },
                    { id: 'denomination', name: 'Value',
                      formatter: (cell) => `Rs. ${cell}` 
                    },
                    { id: 'prize_position', name: 'Rank', 
                      formatter: (cell) => {
                          let color = cell.includes('1st') ? 'text-amber-600 bg-amber-50 border-amber-200' : 
                                      cell.includes('2nd') ? 'text-blue-600 bg-blue-50 border-blue-200' : 
                                      'text-emerald-600 bg-emerald-50 border-emerald-200';
                          return gridjs.html(`<span class="px-2 py-1 text-xs font-bold uppercase border rounded-sm ${color}">${cell}</span>`);
                      }
                    },
                    { id: 'prize_amount', name: 'Prize', 
                      formatter: (cell) => gridjs.html(`<span class="font-mono font-semibold">Rs. ${cell.toLocaleString()}</span>`) 
                    },
                    { id: 'draw_date', name: 'Date', 
                      formatter: (cell, row) => cell || row.cells[5].data // Fallback to year if date empty
                    },
                    { id: 'draw_year', name: 'Year', hidden: true }, 
                    { id: 'source', name: 'Source', 
                      formatter: (cell) => gridjs.html(`<span class="text-xs text-gray-400 font-medium">${cell || 'Official'}</span>`)
                    }
                ],
                server: {
                    url: `${API_BASE}/api/draws`,
                    then: data => data.draws.map(draw => [
                        draw.bond_number,
                        draw.denomination,
                        draw.prize_position,
                        draw.prize_amount,
                        draw.draw_date,
                        draw.draw_year,
                        draw.source
                    ]),
                    total: data => data.total
                },
                pagination: {
                    enabled: true,
                    limit: 10,
                    server: {
                        url: (prev, page, limit) => `${prev}?limit=${limit}&offset=${page * limit}`
                    },
                    summary: true // Shows "Displaying 1 to 10 of..."
                },
                style: { 
                    table: { 'white-space': 'nowrap' }
                },
                className: {
                    table: 'w-full text-left',
                }
            }).render(document.getElementById("grid-wrapper"));
        }

        // 2. SEARCH & FILTER LOGIC
        function updateGridConfig() {
            const denom = document.getElementById('denom-filter').value;
            const rank = document.getElementById('rank-filter').value;
            
            // Grid.js Server-side URL Generator
            // We append extra query params to the URL Grid.js generates
            const urlGenerator = (prev, page, limit) => {
                let url = `${prev}?limit=${limit}&offset=${page * limit}`;
                if (denom) url += `&denomination=${denom}`;
                if (rank) url += `&position=${rank}`;
                return url;
            };

            // Force update the grid configuration
            bondGrid.updateConfig({
                pagination: {
                    server: { url: urlGenerator }
                },
                server: {
                    url: `${API_BASE}/api/draws`,
                    // We need to re-attach the query params for the initial load too
                    url: `${API_BASE}/api/draws?dummy=1` + (denom ? `&denomination=${denom}` : '') + (rank ? `&position=${rank}` : '')
                }
            }).forceRender();
        }

        // 3. STATS FETCHING
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const data = await res.json();
                
                animateValue("total-winners", 0, data.total_winners, 1000);
                
                // Estimates based on winners count (since we don't have explicit totals in stats api)
                const draws = Math.floor(data.total_winners / 1000); 
                document.getElementById('total-draws').innerText = draws.toLocaleString();
                
                const amount = data.by_position.reduce((acc, curr) => acc + curr.total_amount, 0);
                document.getElementById('total-amount').innerText = formatCompact(amount);
            } catch (err) { console.error("Stats error", err); }
        }

        // 4. QUICK SEARCH
        async function triggerSearch() {
            const num = document.getElementById('bond-number').value.trim();
            if(!num || num.length !== 6) {
                alert("Please enter a valid 6-digit bond number");
                return;
            }

            // Create a custom data source for the grid for search mode
            bondGrid.updateConfig({
                pagination: { enabled: false }, // Search results usually don't need heavy pagination logic immediately or can handle it differently
                server: {
                    url: `${API_BASE}/api/search?number=${num}`,
                    then: data => {
                        if(!data.wins || data.wins.length === 0) {
                            alert("No records found for " + num);
                            return [];
                        }
                        return data.wins.map(w => [w.bond_number, w.denomination, w.prize_position, w.prize_amount, w.draw_date, w.draw_year, w.source])
                    },
                    total: data => data.total_wins
                }
            }).forceRender();
        }

        // Helpers
        function setupFilterListeners() {
            document.getElementById('denom-filter').addEventListener('change', updateGridConfig);
            document.getElementById('rank-filter').addEventListener('change', updateGridConfig);
            
            // Bond Number Enter Key
            document.getElementById('bond-number').addEventListener('keyup', (e) => {
                if(e.key === 'Enter') triggerSearch();
            });
        }

        function formatCompact(num) {
            return Intl.NumberFormat('en-US', { notation: "compact", maximumFractionDigits: 1 }).format(num);
        }

        function animateValue(id, start, end, duration) {
            if (start === end) return;
            var range = end - start;
            var current = start;
            var increment = end > start? 1000 : -1000; // rough step
            var stepTime = Math.abs(Math.floor(duration / (range / increment)));
            if(range < 1000) stepTime = 50; increment = 1;

            var obj = document.getElementById(id);
            var timer = setInterval(function() {
                current += increment;
                if(current > end) current = end;
                obj.innerHTML = current.toLocaleString();
                if (current == end) {
                    clearInterval(timer);
                }
            }, 10); // rapid fire
            setTimeout(() => { clearInterval(timer); obj.innerHTML = end.toLocaleString(); }, duration);
        }
    </script>
</body>
</html>
